services:
  - type: web
    name: api-academica
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: fastapi run app/main.py --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
